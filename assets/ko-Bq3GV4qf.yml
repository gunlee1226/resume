experiences:
  title: 경력
  contents:
    - name: 토스모바일 / IT & Security팀 / 매니저
      position: Backend Developer
      job: 토스 100% 지분의 계열사인 토스모바일 IT &amp; Security팀에서 백엔드 개발자로 근무하고 있습니다. <br />
          팀은 인프라, 네트워크 보안, 개인정보보호, 개발 파트로 구성된 10명 내외의 소규모 팀으로, CISO 직속 조직입니다. <br />
          보안을 최우선으로 하는 환경에서 CISO와 함께 업무하며, 보안 중심의 개발 문화를 경험하고 있습니다. <br />
          주 업무는 백엔드 개발이며, SI 시절 쌓은 TA(Technical Architect) 경험을 바탕으로 인프라 설계 및 구성에도 참여합니다. <br />
          AWS Lambda를 활용한 서버리스 백엔드를 설계·구현하였으며, 서비스 간 연동 시 Lambda → Lambda IAM Invoke 방식을 적용해 최소 권한 원칙을 준수하였습니다. <br />
          Security Group, ECS, HTTP API Gateway, VPC Endpoint 등 AWS 인프라를 직접 설계·구성하며, 보안을 최우선으로 고려한 아키텍처를 구축하고 있습니다.
      date:
        from: 2025년 11월
        to: current
        
    - name: 애버커스 소프트웨어 / 데이터플랫폼사업팀 / 선임
      position: Backend Developer & Technology Architecture
      job: SI개발회사에서 근무하였으며 <br />
            신입사원시절 프론트엔드 개발을 시작으로 SWA,TA 의 업무를 부여받아 성공적으로 프로젝트를 완수한 경험이있습니다.<br />
            이후 백엔드 개발을 시작하였고, 현재는 백엔드 개발, SWA, TA 의 업무를 수행하고 있습니다. <br />
            개발자란 단순히 코드를 작성하는것이 아닌 최적의 소프트웨어를 만들어 내는 사람이라고 생각하고. <br />
            자신없는 분야라 할지라도 부딛혀서 배우고 있습니다.
      date:
        from: 2021년 3월
        to: 2025년 10월

